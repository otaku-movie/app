# Native Splash 配置
#
# 这一份用来生成原生（iOS LaunchScreen / Android drawable）的启动屏，
# 解决冷启动时 Flutter 引擎还没起来的「黑屏一闪」。
# Flutter 引擎起来后会立刻渲染我们自己写的 `splash_screen.dart`，
# 两层视觉风格保持一致即可无缝衔接。
#
# 修改后执行：
#   dart run flutter_native_splash:create
# 即可生成/更新 iOS 与 Android 的资源。
flutter_native_splash:
  # 与 lib/pages/splash_screen.dart 的 Scaffold backgroundColor 保持一致。
  # 注意：原生 splash 只用纯品牌底色，不再放任何动漫/第三方图片以规避版权风险。
  # 引擎起来后会立刻渲染 splash_screen.dart 的品牌渐变 + Logo，无缝衔接。
  # 如需放置自有 Logo，请用确权的品牌图替换并取消下面 image 注释。
  color: "#0E1B2C"

  # image: assets/image/brand_logo.png

  # Android 12+ 强制使用系统 SplashScreen API，需要单独配置
  android_12:
    color: "#0E1B2C"
    # image: assets/image/brand_logo.png

  # 全屏 splash，避免顶部刘海留白
  fullscreen: true

  # iOS / Android 同时生成
  android: true
  ios: true
  web: false
